spring.datasource.tm.jdbc-url=jdbc:h2:mem:tmdb;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.tm.username=sa
spring.datasource.tm.password=
spring.datasource.tm.driver-class-name=org.h2.Driver
spring.datasource.tm.maximum-pool-size=4
spring.datasource.tm.minimum-idle=1

spring.datasource.eam.jdbc-url=jdbc:h2:mem:eamdb;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.eam.username=sa
spring.datasource.eam.password=
spring.datasource.eam.driver-class-name=org.h2.Driver
spring.datasource.eam.maximum-pool-size=4
spring.datasource.eam.minimum-idle=1
spring.datasource.eam.read-only=true

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.default_schema=PUBLIC
spring.flyway.enabled=false

app.jwt.secret=test-test-test-test-test-test-test-test

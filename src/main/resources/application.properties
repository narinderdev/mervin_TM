spring.application.name=tm-service
server.port=${SERVER_PORT:8082}

# TM database (read/write)
spring.datasource.tm.jdbc-url=${TM_DB_URL:jdbc:sqlserver://localhost:1435;databaseName=TmDB;encrypt=false;trustServerCertificate=true}
spring.datasource.tm.username=${TM_DB_USERNAME:admin}
spring.datasource.tm.password=${TM_DB_PASSWORD:mervin_time_management}
spring.datasource.tm.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.tm.pool-name=tm-hikari-pool
spring.datasource.tm.maximum-pool-size=${TM_DB_MAX_POOL_SIZE:12}
spring.datasource.tm.minimum-idle=${TM_DB_MIN_IDLE:4}
spring.datasource.tm.connection-timeout=${TM_DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.tm.idle-timeout=${TM_DB_IDLE_TIMEOUT_MS:600000}
spring.datasource.tm.max-lifetime=${TM_DB_MAX_LIFETIME_MS:1800000}
spring.datasource.tm.validation-timeout=${TM_DB_VALIDATION_TIMEOUT_MS:5000}

# EAM database (read-only)
spring.datasource.eam.jdbc-url=${EAM_DB_URL:jdbc:sqlserver://localhost:1433;databaseName=Eamdb;encrypt=false;trustServerCertificate=true}
spring.datasource.eam.username=${EAM_DB_USERNAME:apnitor}
spring.datasource.eam.password=${EAM_DB_PASSWORD:Dev@Apnitor@!23}
spring.datasource.eam.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.eam.pool-name=eam-hikari-pool
spring.datasource.eam.maximum-pool-size=${EAM_DB_MAX_POOL_SIZE:20}
spring.datasource.eam.minimum-idle=${EAM_DB_MIN_IDLE:6}
spring.datasource.eam.connection-timeout=${EAM_DB_CONNECTION_TIMEOUT_MS:20000}
spring.datasource.eam.idle-timeout=${EAM_DB_IDLE_TIMEOUT_MS:300000}
spring.datasource.eam.max-lifetime=${EAM_DB_MAX_LIFETIME_MS:1800000}
spring.datasource.eam.validation-timeout=${EAM_DB_VALIDATION_TIMEOUT_MS:5000}
spring.datasource.eam.read-only=true
spring.datasource.eam.auto-commit=false
spring.datasource.eam.transaction-isolation=TRANSACTION_READ_COMMITTED

# JPA (TM only)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=dbo

# Flyway (TM only)
spring.flyway.enabled=true
spring.flyway.url=${spring.datasource.tm.jdbc-url}
spring.flyway.user=${spring.datasource.tm.username}
spring.flyway.password=${spring.datasource.tm.password}
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=dbo

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.url=/v3/api-docs
server.forward-headers-strategy=framework

logging.pattern.level=%5p [cid:%X{correlationId:-}]
logging.level.org.springframework.jdbc.core.JdbcTemplate=INFO
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=INFO

app.jwt.secret=${APP_JWT_SECRET:change-this-to-the-same-secret-as-eam-min-32-chars}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8082,http://127.0.0.1:4200}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://*.ngrok-free.app,http://*.ngrok-free.app}

# Actuator (optional)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never
